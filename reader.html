<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPUB Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>
    <style>
        body { margin: 0; background: #fcf9f2; font-family: 'Prompt', sans-serif; overflow: hidden; }
        .reader-header { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #viewer { height: calc(100vh - 120px); width: 100%; max-width: 800px; margin: 0 auto; background: white; }
        .nav-bar { height: 60px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; }
        .btn { background: #764ba2; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div id="reader-overlay">
    <div class="reader-header">
        <button onclick="closeBook()" style="background:#ff4d4d; color:white; border:none; padding:8px 15px; border-radius:5px;">❌ ออก</button>
        <span id="book-title-display" style="font-size:14px; color:#d4af37;"></span>
        <span id="page-info" style="font-size:12px; color:#ccc;"></span>
    </div>

    <div id="reading-progress"></div> <div id="epub-viewer" style="flex-grow: 1; display:none;">
        <div id="epub-render" style="width:100%; height:100%;"></div>
    </div>
    
    <iframe id="pdf-viewer" style="flex-grow: 1; display:none;"></iframe>

    <div class="nav-controls" id="epub-nav-ui" style="display:none;">
        <button class="nav-btn" onclick="prevPage()">❮</button>
        <button class="nav-btn" onclick="nextPage()">❯</button>
    </div>
</div>

    <script>
        const API_KEY = 'วาง_API_KEY_ของคุณที่นี่';
        const params = new URLSearchParams(window.location.search);
        const fileId = params.get('id');
        const folderId = params.get('folder');
        
        document.getElementById('book-title').innerText = params.get('name') || "Reading...";

        // ใช้ URL สำหรับดึงข้อมูลผ่าน API โดยตรง
        const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`;

        // โหลดหนังสือ
        const book = ePub(url);
        const rendition = book.renderTo("viewer", {
            width: "100%",
            height: "100%",
            flow: "paginated",
            manager: "default"
        });

        rendition.display().then(() => {
            document.getElementById('loading').style.display = 'none';
        }).catch(err => {
            document.getElementById('loading').innerText = "ไม่สามารถเปิดไฟล์ EPUB นี้ได้โดยตรงจาก Browser เนื่องจากนโยบายความปลอดภัยของ Google";
            console.error(err);
        });

        function goBack() {
            window.location.href = `smart-archive.html?folder=${folderId}`;
        }
    </script>
</body>
</html>
