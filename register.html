<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - Reader App</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* สไตล์ความสวยงามเหมือนเดิมทุกประการครับ */
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .register-container { background-color: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 32px; font-weight: 600; color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; transition: border-color 0.3s; }
        .input-group input:focus { border-color: #764ba2; }
        .btn-register { width: 100%; padding: 12px; background: #764ba2; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; transition: background 0.3s; margin-bottom: 20px; }
        .btn-register:hover { background: #667eea; }
        .login-link { color: #666; font-size: 14px; }
        .login-link a { color: #764ba2; text-decoration: none; font-weight: 500; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="logo">📚 My Reader</div>
        <div class="subtitle">สร้างบัญชีใหม่เพื่อเข้าสู่โลกแห่งการอ่าน</div>

        <div class="input-group">
            <input type="email" placeholder="อีเมลของคุณ" id="regEmail">
        </div>
        <div class="input-group">
            <input type="password" placeholder="ตั้งรหัสผ่าน (ขั้นต่ำ 6 ตัว)" id="regPassword">
        </div>
        <div class="input-group">
            <input type="password" placeholder="ยืนยันรหัสผ่านอีกครั้ง" id="regConfirmPassword">
        </div>
        
        <button class="btn-register" id="btnRegister">สมัครสมาชิก</button>

        <div class="login-link">
            มีบัญชีอยู่แล้วใช่ไหม? <a href="index.html">กลับไปหน้าเข้าสู่ระบบ</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // 🌟 เพิ่มคำสั่ง signOut เข้ามา เพื่อบังคับเตะออกหลังสมัครเสร็จ
        import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // ==========================================
        // 🚨 ใส่กุญแจ Firebase ของคุณตรงนี้ 🚨
        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyBZUngq475pYOrX74lH9odnrYQI7mKw2vo",
  authDomain: "myreaderapp-89e75.firebaseapp.com",
  projectId: "myreaderapp-89e75",
  storageBucket: "myreaderapp-89e75.firebasestorage.app",
  messagingSenderId: "1016151043482",
  appId: "1:1016151043482:web:1d7e4fc51d3cab3e2c5e23"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('btnRegister').addEventListener('click', () => {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if(!email || !password || !confirmPassword) {
                alert("กรุณากรอกข้อมูลให้ครบทุกช่องครับ");
                return;
            }
            if(password !== confirmPassword) {
                alert("รหัสผ่านไม่ตรงกัน กรุณาตรวจสอบอีกครั้งครับ");
                return;
            }

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    sendEmailVerification(userCredential.user)
                        .then(() => {
                            // 🌟 บังคับล็อกเอาต์ทันที และเตะกลับไปหน้า Login
                            signOut(auth).then(() => {
                                alert("🎉 สมัครสมาชิกสำเร็จ!\n\nระบบได้ส่งลิงก์ไปที่อีเมลแล้ว\nกรุณากดยืนยันในอีเมลก่อนเข้าสู่ระบบครับ");
                                window.location.href = 'index.html'; // กลับไปหน้าแรก
                            });
                        });
                })
                .catch((error) => {
                    if(error.code === 'auth/email-already-in-use') {
                        alert("อีเมลนี้มีผู้ใช้งานแล้วครับ");
                    } else if (error.code === 'auth/weak-password') {
                        alert("รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษรครับ");
                    } else {
                        alert("เกิดข้อผิดพลาด: " + error.message);
                    }
                });
        });
    </script>
</body>
</html>
