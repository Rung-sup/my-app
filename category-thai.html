<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รวมนิยายไทย - Reader App</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
        }
        .header {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 24px;
            margin-right: 15px;
            cursor: pointer;
        }
        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        /* รูปแบบรายชื่อหนังสือ */
        .book-item {
            background-color: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .book-cover {
            font-size: 35px;
            margin-right: 15px;
            background: #f0f0f0;
            min-width: 60px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            /* อนาคตสามารถเปลี่ยนตรงนี้เป็นการใส่รูปภาพหน้าปกจริงได้ */
        }
        .book-details {
            flex-grow: 1;
        }
        .book-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin: 0 0 5px 0;
        }
        .book-author {
            font-size: 13px;
            color: #777;
            margin: 0;
        }
        .btn-read {
            background-color: #764ba2;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s;
            margin-left: 10px;
            white-space: nowrap;
        }
        .btn-read:hover {
            background-color: #667eea;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="categories.html" class="back-btn">⬅️</a>
        🇹🇭 รวมนิยายไทย
    </div>

    <div class="container">
        
        <div class="book-item">
            <div class="book-cover">📕</div>
            <div class="book-details">
                <h3 class="book-title">เพชรพระอุมา ภาค 1</h3>
                <p class="book-author">พนมเทียน</p>
            </div>
            <a href="reader.html" class="btn-read">อ่านเลย</a>
        </div>

        <div class="book-item">
            <div class="book-cover">📘</div>
            <div class="book-details">
                <h3 class="book-title">สี่แผ่นดิน</h3>
                <p class="book-author">ม.ร.ว.คึกฤทธิ์ ปราโมช</p>
            </div>
            <a href="#" class="btn-read" onclick="alert('เปิดตัวอ่านไฟล์หนังสือเล่มที่ 2')">อ่านเลย</a>
        </div>

        <div class="book-item">
            <div class="book-cover">📗</div>
            <div class="book-details">
                <h3 class="book-title">ผู้ชนะสิบทิศ</h3>
                <p class="book-author">ยาขอบ</p>
            </div>
            <a href="#" class="btn-read" onclick="alert('เปิดตัวอ่านไฟล์หนังสือเล่มที่ 3')">อ่านเลย</a>
        </div>

    </div>

</body>
</html>
