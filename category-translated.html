<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รวมนิยายแปล - Reader App</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
        }
        .header {
            /* เปลี่ยนโทนสีให้เป็นสีฟ้าน้ำทะเล สำหรับหมวดนิยายแปล */
            background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 24px;
            margin-right: 15px;
            cursor: pointer;
        }
        .container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .book-item {
            background-color: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .book-cover {
            font-size: 35px;
            margin-right: 15px;
            background: #f0f0f0;
            min-width: 60px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
        }
        .book-details {
            flex-grow: 1;
        }
        .book-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin: 0 0 5px 0;
        }
        .book-author {
            font-size: 13px;
            color: #777;
            margin: 0;
        }
        .btn-read {
            background-color: #2b5876;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s;
            margin-left: 10px;
            white-space: nowrap;
        }
        .btn-read:hover {
            background-color: #4e4376;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="categories.html" class="back-btn">⬅️</a>
        🌍 รวมนิยายแปล
    </div>

    <div class="container">
        
        <div class="book-item">
            <div class="book-cover">🧙‍♂️</div>
            <div class="book-details">
                <h3 class="book-title">แฮร์รี่ พอตเตอร์</h3>
                <p class="book-author">J.K. Rowling</p>
            </div>
            <a href="#" class="btn-read" onclick="alert('เตรียมเปิดตัวอ่านหนังสือนิยายแปลเล่มที่ 1')">อ่านเลย</a>
        </div>

        <div class="book-item">
            <div class="book-cover">🕵️‍♂️</div>
            <div class="book-details">
                <h3 class="book-title">เชอร์ล็อก โฮล์มส์</h3>
                <p class="book-author">Arthur Conan Doyle</p>
            </div>
            <a href="#" class="btn-read" onclick="alert('เตรียมเปิดตัวอ่านหนังสือนิยายแปลเล่มที่ 2')">อ่านเลย</a>
        </div>

        <div class="book-item">
            <div class="book-cover">💍</div>
            <div class="book-details">
                <h3 class="book-title">เดอะลอร์ดออฟเดอะริงส์</h3>
                <p class="book-author">J.R.R. Tolkien</p>
            </div>
            <a href="#" class="btn-read" onclick="alert('เตรียมเปิดตัวอ่านหนังสือนิยายแปลเล่มที่ 3')">อ่านเลย</a>
        </div>

    </div>

</body>
</html>
